name: Refresh flights

on:
  schedule:
    # 每 10 分鐘（UTC）；桃園由 refresh-tpe-flights.yml 另排
    - cron: "0,10,20,30,40,50 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch flight snapshot
        run: python scripts/fetch_flights_snapshot.py

      - name: Commit and push if changed
        id: commit
        run: |
          git add data/
          bash .github/scripts/commit-push-retry.sh "chore: refresh flight data"

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -fsS "https://purge.jsdelivr.net/gh/oURFo/typhoon-monitor@main/data/flights.json" || true
          curl -fsS "https://purge.jsdelivr.net/gh/oURFo/typhoon-monitor@main/data/tpe-flights.json" || true
