name: Refresh TPE flights

on:
  schedule:
    # 每 30 分鐘（UTC），與主排程錯開 5 分鐘
    - cron: "5,35 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  TPE_SKIP_ODP: "1"
  TPE_TIMEOUT: "60"
  TPE_CONNECT_TIMEOUT: "30"
  TPE_FETCH_RETRIES: "1"
  TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
  TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}

jobs:
  refresh-tpe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch TPE snapshot
        run: python scripts/fetch_tpe_snapshot.py

      - name: Commit and push if changed
        id: commit
        run: |
          git add data/tpe-flights.json data/flights.json data/airport-iata-zh.json
          bash .github/scripts/commit-push-retry.sh "chore: refresh TPE flight data"

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -fsS "https://purge.jsdelivr.net/gh/oURFo/typhoon-monitor@main/data/flights.json" || true
          curl -fsS "https://purge.jsdelivr.net/gh/oURFo/typhoon-monitor@main/data/tpe-flights.json" || true
