name: Refresh TPE flights

on:
  schedule:
    # 每 10 分鐘，與主排程錯開 5 分鐘（UTC）
    - cron: "5,15,25,35,45,55 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  TPE_TIMEOUT: "240"
  TPE_CONNECT_TIMEOUT: "120"
  TPE_FETCH_RETRIES: "5"

jobs:
  refresh-tpe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch TPE snapshot
        run: python scripts/fetch_tpe_snapshot.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tpe-flights.json data/flights.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: refresh TPE flight data"
          git pull --rebase origin main
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -fsS "https://purge.jsdelivr.net/gh/oURFo/typhoon-monitor@main/data/flights.json" || true
          curl -fsS "https://purge.jsdelivr.net/gh/oURFo/typhoon-monitor@main/data/tpe-flights.json" || true
