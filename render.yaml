services:
  - type: web
    name: typhoon-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    buildFilter:
      ignoredPaths:
        - data/**
    envVars:
      - key: CWA_API_KEY
        sync: false
      - key: TDX_CLIENT_ID
        sync: false
      - key: TDX_CLIENT_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
